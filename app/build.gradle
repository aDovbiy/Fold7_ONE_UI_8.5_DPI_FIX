plugins {
    id "com.android.application"
}

android {
    namespace "com.fold7.density"
    compileSdk 35

    defaultConfig {
        applicationId "com.fold7.density"
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }

    buildFeatures {
        aidl true
        buildConfig true
    }
}

dependencies {
    def shizukuVersion = "13.1.5"
    implementation "dev.rikka.shizuku:api:$shizukuVersion"
    implementation "dev.rikka.shizuku:provider:$shizukuVersion"
}
